name: Build

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-2025
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-26
            rid: osx-arm64
          - os: macos-26-intel
            rid: osx-x64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: guitarrapc/actions/.github/actions/setup-dotnet@9122a18b0dea07585a242b9eb6ed7886f8587c49 # v1.0.1
        with:
          restore-wasm-workload: true
      - name: Build
        run: dotnet build -c Release
      - name: Test
        env:
          # Cap TUnit parallelism to match typical GHA runner cores (avoids CPU-heavy QR/Skia tests oversubscribing).
          TUNIT_MAX_PARALLEL_TESTS: 4
        run: dotnet test -c Release

  run:
    needs: [build]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
            ext: ""
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            ext: ""
          - os: windows-2025
            rid: win-x64
            ext: ".exe"
          - os: windows-11-arm
            rid: win-arm64
            ext: ".exe"
          - os: macos-26
            rid: osx-arm64
            ext: ""
          - os: macos-26-intel
            rid: osx-x64
            ext: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: guitarrapc/actions/.github/actions/setup-dotnet@9122a18b0dea07585a242b9eb6ed7886f8587c49 # v1.0.1
        with:
          dotnet-version: 10.0.x
      # ConsoleApp
      - name: Run ConsoleApp
        run: dotnet run -c Release -r ${{ matrix.rid }} -- --output-dir samples
        working-directory: ./samples/ConsoleApp
      # SimpleGenerate
      - name: Run SimpleGenerate
        run: dotnet run -c Release -r ${{ matrix.rid }}
        working-directory: ./samples/SimpleGenerate
      # NativeAOT
      - name: Run ConsoleAppNativeAOT
        shell: bash
        run: |
          dotnet publish ./samples/ConsoleAppNativeAOT/ConsoleAppNativeAOT.csproj -c Release -r ${{ matrix.rid }} -o ./publish/
          cd ./publish/
          ls -l
          chmod +x ConsoleAppNativeAOT${{ matrix.ext }}
          ./ConsoleAppNativeAOT${{ matrix.ext }}

  # Playground native relink (SkiaSharp + Emscripten) only happens on publish, so the
  # matrix `dotnet build` above stays managed-only. Verify the publish path on one leg.
  # AOT is disabled here for speed; the Deploy Playground workflow publishes with full AOT.
  build-playground:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: guitarrapc/actions/.github/actions/setup-dotnet@9122a18b0dea07585a242b9eb6ed7886f8587c49 # v1.0.1
        with:
          dotnet-version: 10.0
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools
      # No -r browser-wasm: it would propagate to the multi-targeted library reference
      # and require the wasm-tools-net8 workload; the WebAssembly SDK defaults the RID anyway.
      - name: Publish Playground (browser-wasm Release, no AOT)
        run: dotnet publish src/SkiaSharp.QrCode.Playground/SkiaSharp.QrCode.Playground.csproj -c Release -p:RunAOTCompilation=false -p:PlaygroundSoftFingerprint=true -o publish/playground/

  build-complete:
    needs: [build, run, build-playground]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    timeout-minutes: 1
    steps:
      - name: Build Complete
        run: echo "Build and Run completed successfully."
