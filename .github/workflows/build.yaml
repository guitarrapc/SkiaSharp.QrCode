name: Build

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-2025
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-26
            rid: osx-arm64
          - os: macos-26-intel
            rid: osx-x64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: guitarrapc/actions/.github/actions/setup-dotnet@9122a18b0dea07585a242b9eb6ed7886f8587c49 # v1.0.1
        with:
          restore-wasm-workload: true
      - name: Build
        run: dotnet build -c Release -r ${{ matrix.rid }}
      - name: Test
        run: dotnet test -c Release -r ${{ matrix.rid }} --logger GitHubActions --logger "console;verbosity=normal"

  run:
    needs: [build]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
            ext: ""
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            ext: ""
          - os: windows-2025
            rid: win-x64
            ext: ".exe"
          - os: windows-11-arm
            rid: win-arm64
            ext: ".exe"
          - os: macos-26
            rid: osx-arm64
            ext: ""
          - os: macos-26-intel
            rid: osx-x64
            ext: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: guitarrapc/actions/.github/actions/setup-dotnet@9122a18b0dea07585a242b9eb6ed7886f8587c49 # v1.0.1
        with:
          dotnet-version: 10.0.x
      # ConsoleApp
      - name: Run ConsoleApp
        run: dotnet run -c Release -r ${{ matrix.rid }}
        working-directory: ./samples/ConsoleApp
      # SimpleGenerate
      - name: Run SimpleGenerate
        run: dotnet run -c Release -r ${{ matrix.rid }}
        working-directory: ./samples/SimpleGenerate
      # NativeAOT
      - name: Run ConsoleAppNativeAOT
        shell: bash
        run: |
          dotnet publish ./samples/ConsoleAppNativeAOT/ConsoleAppNativeAOT.csproj -c Release -r ${{ matrix.rid }} -o ./publish/
          cd ./publish/
          ls -l
          chmod +x ConsoleAppNativeAOT${{ matrix.ext }}
          ./ConsoleAppNativeAOT${{ matrix.ext }}
